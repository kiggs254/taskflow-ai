<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TASKFLOW.AI</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/fY4ZPKTr/Untitled-design-8.png" />
    <!--
      Tailwind is compiled at build time (tailwind.config.js + index.css), not by the
      cdn.tailwindcss.com runtime that used to live here. That script shipped a full
      CSS-in-JS compiler to the browser and rebuilt the stylesheet on every DOM
      mutation via a MutationObserver, which this app triggers on every poll tick.

      The importmap that also lived here has been removed: Vite rewrites bare
      specifiers at build time, so nothing ever resolved through it. It was inert only
      for as long as everything went through Vite, and would otherwise have silently
      pinned React and lucide to different CDN versions than package.json.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
